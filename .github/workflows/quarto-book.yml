name: Bygg og publiser Quarto-bok

on:
  schedule:
    # Kl. 07:00 UTC 1. i hver måned - to timer etter StarDict-bygget
    # (Build.yml). De to workflowene er uavhengige av hverandre; dette er
    # bare et praktisk tidsvalg for å unngå at begge kjører samtidig.
    - cron: '0 7 1 * *'
  workflow_dispatch: {}   # tillat manuell kjøring fra Actions-fanen

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 180
    env:
      # ubuntu-latest på et offentlig repo har 16 GB RAM, men Quartos
      # Deno-prosess bruker som standard en V8-heap-grense på ~8 GB
      # uavhengig av dette. Boka er stor nok til at rendering av alle
      # kapitlene i én bok (selv med search:false, se book/bm/_quarto.yml)
      # kan gå tom for minne i en avsluttende bok-omfattende fase (etter
      # at alle enkeltkapitler er ferdig rendret). Løfter grensen for å
      # bruke mer av det som faktisk er tilgjengelig på runneren.
      QUARTO_DENO_V8_OPTIONS: --max-old-space-size=14336
    steps:
      - name: Sjekk ut repo
        uses: actions/checkout@v4

      - name: Sett opp Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Last ned artikkeldata
        run: |
          mkdir -p tmp
          curl -sSL --fail -o tmp/bm.tar.gz https://ord.uib.no/bm/fil/article.tar.gz
          curl -sSL --fail -o tmp/nn.tar.gz https://ord.uib.no/nn/fil/article.tar.gz

      - name: Last ned Norsk Ordbank (sammensetningsanalyse, beste innsats)
        run: |
          source scripts/lib_ordbank.sh
          hent_ordbank bm tmp/bm-ordbank.tar.gz
          hent_ordbank nn tmp/nn-ordbank.tar.gz

      - name: Generer Quarto-kapitler
        run: |
          BM_ORDBANK=(); [ -f tmp/bm-ordbank.tar.gz ] && BM_ORDBANK=(tmp/bm-ordbank.tar.gz)
          NN_ORDBANK=(); [ -f tmp/nn-ordbank.tar.gz ] && NN_ORDBANK=(tmp/nn-ordbank.tar.gz)
          python3 scripts/ordbok_til_quarto.py tmp/bm.tar.gz book/bm "Bokmålsordboka" "${BM_ORDBANK[@]}"
          python3 scripts/ordbok_til_quarto.py tmp/nn.tar.gz book/nn "Nynorskordboka" "${NN_ORDBANK[@]}"

      - name: Sett opp Quarto
        uses: quarto-dev/quarto-actions/setup@v2

      - name: Installer TinyTeX (for PDF)
        run: quarto install tinytex --no-prompt

      - name: Render Bokmålsordboka HTML (må lykkes)
        run: quarto render book/bm --to html

      - name: Render Nynorskordboka HTML (må lykkes)
        run: quarto render book/nn --to html

      - name: Render Bokmålsordboka PDF (beste innsats - hopper over ved feil)
        id: pdf_bm
        continue-on-error: true
        run: quarto render book/bm --to pdf

      - name: Render Nynorskordboka PDF (beste innsats - hopper over ved feil)
        id: pdf_nn
        continue-on-error: true
        run: quarto render book/nn --to pdf

      - name: Render Bokmålsordboka EPUB (beste innsats - hopper over ved feil)
        id: epub_bm
        continue-on-error: true
        run: quarto render book/bm --to epub

      - name: Render Nynorskordboka EPUB (beste innsats - hopper over ved feil)
        id: epub_nn
        continue-on-error: true
        run: quarto render book/nn --to epub

      - name: Oppsummer PDF/EPUB-status
        if: always()
        run: |
          echo "Bokmål PDF:    ${{ steps.pdf_bm.outcome }}"
          echo "Nynorsk PDF:   ${{ steps.pdf_nn.outcome }}"
          echo "Bokmål EPUB:   ${{ steps.epub_bm.outcome }}"
          echo "Nynorsk EPUB:  ${{ steps.epub_nn.outcome }}"

      - name: Sett sammen nettsted
        run: |
          mkdir -p site
          cp book/index.html site/index.html
          cp -r book/bm/_book site/bm
          cp -r book/nn/_book site/nn

      - name: Last opp Pages-artefakt
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Publiser til GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
