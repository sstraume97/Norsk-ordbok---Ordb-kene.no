name: Bygg StarDict fra Ordbøkene

on:
  schedule:
    # Kl. 05:00 UTC hver mandag - noen timer etter at ord.uib.no
    # oppdaterer article.tar.gz "natt til mandag".
    - cron: '0 5 * * 1'
  workflow_dispatch: {}   # tillat manuell kjøring fra Actions-fanen

permissions:
  contents: write   # trengs for å committe oppdatert state/ og lage release

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Sjekk ut repo
        uses: actions/checkout@v4

      - name: Sett opp Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Installer pyglossary
        run: pip install pyglossary

      - name: Last ned, sjekk endringer og bygg ordbøker
        id: build
        run: bash scripts/build.sh

      - name: Datostempel for release-tag
        if: steps.build.outputs.changed == 'true'
        id: date
        run: echo "value=$(date -u +%Y-%m-%d)" >> "$GITHUB_OUTPUT"

      - name: Committ oppdatert state
        if: steps.build.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add state/
