name: Bygg StarDict fra Ordbøkene

on:
  schedule:
    # Kl. 05:00 UTC 1. i hver måned. ord.uib.no oppdaterer article.tar.gz
    # ukentlig, så vi er alltid innenfor én uke etter siste kildeendring.
    - cron: '0 5 1 * *'
  workflow_dispatch:
    inputs:
      force:
        description: "Tving nytt bygg/release selv om kildedata hos ord.uib.no ikke har endret seg (f.eks. etter endringer i konverteringsskriptene)"
        type: boolean
        default: false

permissions:
  contents: write   # trengs for å committe oppdatert state/ og lage release

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Sjekk ut repo
        uses: actions/checkout@v4

      - name: Sett opp Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Installer pyglossary og dictzip
        run: |
          pip install pyglossary
          sudo apt-get update
          sudo apt-get install -y dictzip

      - name: Last ned, sjekk endringer og bygg ordbøker
        id: build
        env:
          FORCE_REBUILD: ${{ github.event.inputs.force }}
        run: bash scripts/build.sh

      - name: Datostempel for release-tag
        if: steps.build.outputs.changed == 'true'
        id: date
        run: echo "value=$(date -u +%Y-%m-%d)" >> "$GITHUB_OUTPUT"

      - name: Committ oppdatert state
        if: steps.build.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add state/
          # Ved FORCE_REBUILD uten reell datakildeendring er state/-
          # innholdet identisk med det som allerede er committet - da er
          # det ingenting å committe, og det skal ikke feile bygget.
          if git diff --cached --quiet; then
            echo "Ingen endring i state/ - hopper over commit."
          else
            git commit -m "Oppdater state etter bygg ${{ steps.date.outputs.value }}"
            git push
          fi

      - name: Lag daterte kopier
        if: steps.build.outputs.changed == 'true'
        env:
          TAG: ${{ steps.date.outputs.value }}
        run: |
          # bm-stardict.zip/nn-stardict.zip beholder faste navn (stabil
          # /releases/latest/download/-lenke, se README), mens de
          # daterte kopiene lar deg peke til en bestemt utgave.
          cp dist/bm-stardict.zip "dist/bm-stardict-${TAG}.zip"
          cp dist/nn-stardict.zip "dist/nn-stardict-${TAG}.zip"

      - name: Lag GitHub Release
        if: steps.build.outputs.changed == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ steps.date.outputs.value }}
        run: |
          FILES=(
            dist/bm-stardict.zip
            dist/nn-stardict.zip
            "dist/bm-stardict-${TAG}.zip"
            "dist/nn-stardict-${TAG}.zip"
          )
          if gh release view "$TAG" --repo "${{ github.repository }}" >/dev/null 2>&1; then
            echo "Release $TAG finnes allerede - oppdaterer filene og notatene."
            gh release upload "$TAG" "${FILES[@]}" \
              --repo "${{ github.repository }}" --clobber
            gh release edit "$TAG" \
              --repo "${{ github.repository }}" \
              --notes-file dist/release-notes.md
          else
            gh release create "$TAG" "${FILES[@]}" \
              --repo "${{ github.repository }}" \
              --title "Ordbøkene $TAG" \
              --notes-file dist/release-notes.md \
              --latest
          fi
